<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linea dinamica</title>
</head>
<body>
    <h2>Línea Dinámica REALIZADO POR <br> ARENAS LLAMOCCA KYET ALBERT</h2>
    <canvas id="myCanvas" width="800" height="400" style="border: 1px solid black;"></canvas>
<!-- CODIGO JAVASCRIP -->

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    const width = canvas.width;
    const height = canvas.height;
    const centerX = width / 2;
    const centerY = height / 2;

    var xstart = -400;
    var xend = 400;
    var step = 0.5;
    var time = 0;

    function drawSimplePlane() {
        ctx.save();
        ctx.beginPath();
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1.5;
        ctx.moveTo(0, centerY);
        ctx.lineTo(width, centerY);
        ctx.moveTo(centerX, 0);
        ctx.lineTo(centerX, height);
        ctx.stroke();
        ctx.restore();
    }

    function drawGraph() {
        ctx.clearRect(0, 0, width, height);
        drawSimplePlane();

        // Primera onda: Seno (azul)
        ctx.beginPath();
        ctx.strokeStyle = 'blue';
        ctx.lineWidth = 2;
        let p1 = true;
        for (let x = xstart; x <= xend; x += step) {
            let y = Math.sin(x * 0.01 + time) * 100;
            let cx = centerX + x;
            let cy = centerY - y;
            if (p1) { ctx.moveTo(cx, cy); p1 = false; }
            else { ctx.lineTo(cx, cy); }
        }
        ctx.stroke();

        // Segunda onda: Coseno (rojo)
        ctx.beginPath();
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 2;
        let p2 = true;
        for (let x = xstart; x <= xend; x += step) {
            let y = Math.cos(x * 0.015 + time * 0.7) * 80;
            let cx = centerX + x;
            let cy = centerY - y;
            if (p2) { ctx.moveTo(cx, cy); p2 = false; }
            else { ctx.lineTo(cx, cy); }
        }
        ctx.stroke();
    }

    function animate() {
        drawGraph();
        time += 0.08;
        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
